
<style>
*{box-sizing:border-box;margin:0;padding:0}
#root{background:#0d0a1a;border-radius:12px;overflow:hidden;font-family:var(--font-sans);color:#e8e0ff;min-height:580px;display:flex;flex-direction:column}
#hud{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#130f2a;border-bottom:1px solid #2a1f5a}
.hud-stat{display:flex;flex-direction:column;align-items:center;gap:1px}
.hud-label{font-size:10px;color:#6b5fa0;letter-spacing:0.1em;text-transform:uppercase}
.hud-val{font-size:16px;font-weight:500;color:#c4b5fd}
#canvas-wrap{position:relative;flex:1}
canvas{display:block}
#ui-panel{background:#130f2a;border-top:1px solid #2a1f5a;padding:14px 16px}
#spell-prompt{font-size:11px;color:#6b5fa0;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;text-align:center}
#integral-display{font-size:20px;font-weight:500;color:#e0d4ff;text-align:center;margin-bottom:12px;font-family:var(--font-mono);letter-spacing:0.02em}
#choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.spell-btn{background:#1e1640;border:1px solid #3d2f80;border-radius:8px;padding:10px 8px;font-size:13px;font-family:var(--font-mono);cursor:pointer;color:#c4b5fd;transition:background 0.15s,border-color 0.15s;text-align:center}
.spell-btn:hover{background:#2a1f5a;border-color:#6b5fa0}
.spell-btn.correct{background:#0f2a1a;border-color:#22c55e;color:#86efac}
.spell-btn.wrong{background:#2a0f1a;border-color:#e24b4a;color:#fca5a5}
.spell-btn:disabled{cursor:default}
#feedback-bar{font-size:13px;text-align:center;min-height:18px;color:#6b5fa0}
#feedback-bar.good{color:#86efac;font-weight:500}
#feedback-bar.bad{color:#fca5a5;font-weight:500}
#wasd-hint{font-size:11px;color:#3d2f80;text-align:center;margin-top:8px}
#overlay-wrap{display:none;position:absolute;inset:0;background:rgba(10,6,30,0.92);align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:2rem;z-index:20}
#overlay-wrap.show{display:flex}
#ov-title{font-size:22px;font-weight:500;color:#c4b5fd}
#ov-sub{font-size:14px;color:#8b7ec8;line-height:1.7;max-width:340px}
#ov-btn{background:#2a1f5a;border:1px solid #6b5fa0;border-radius:8px;padding:10px 28px;font-size:14px;cursor:pointer;color:#c4b5fd}
#ov-btn:hover{background:#3d2f80}
#stars-canvas{position:absolute;inset:0;pointer-events:none;z-index:0}
</style>

<div id="root">
  <div id="hud">
    <div class="hud-stat"><span class="hud-label">Level</span><span class="hud-val" id="h-level">1</span></div>
    <div class="hud-stat"><span class="hud-label">Score</span><span class="hud-val" id="h-score">0</span></div>
    <div class="hud-stat"><span class="hud-label">Mana</span><span class="hud-val" id="h-mana">3 / 3</span></div>
    <div class="hud-stat"><span class="hud-label">Streak</span><span class="hud-val" id="h-streak">0</span></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="stars-canvas"></canvas>
    <canvas id="gc"></canvas>
    <div id="overlay-wrap">
      <div id="ov-title"></div>
      <div id="ov-sub"></div>
      <button id="ov-btn" onclick="overlayAct()"></button>
    </div>
  </div>

  <div id="ui-panel">
    <div id="spell-prompt">Cast the antiderivative spell</div>
    <div id="integral-display">∫ 6x² dx</div>
    <div id="choices-grid"></div>
    <div id="feedback-bar"></div>
    <div id="wasd-hint">WASD or arrow keys to move · step on a rune to open the gate</div>
  </div>
</div>

<script>
const LEVELS = [
  {name:"The Crypts — Power Rule",boss:"Skeleton Sorcerer",bossEmoji:"💀",color:"#7c3aed",
   problems:[
    {q:"∫ 6x² dx",a:"2x³ + C",w:["3x³ + C","6x³ + C","x³ + C"]},
    {q:"∫ 4x³ dx",a:"x⁴ + C",w:["4x⁴ + C","x³ + C","12x² + C"]},
    {q:"∫ 5 dx",a:"5x + C",w:["5 + C","x + C","5x² + C"]},
    {q:"∫ x dx",a:"x²/2 + C",w:["x² + C","2x + C","x²/3 + C"]},
   ]},
  {name:"The Lava Halls — Polynomials",boss:"Fire Golem",bossEmoji:"🔥",color:"#ea580c",
   problems:[
    {q:"∫ (3x² − 2x + 1) dx",a:"x³ − x² + x + C",w:["3x³ − x² + C","6x − 2 + C","x³ − 2x² + x + C"]},
    {q:"∫ (x³ + x) dx",a:"x⁴/4 + x²/2 + C",w:["x⁴ + x² + C","3x² + 1 + C","x⁴/4 + x + C"]},
    {q:"∫ (2x + 7) dx",a:"x² + 7x + C",w:["2x² + 7x + C","x² + 7 + C","2x + C"]},
    {q:"∫ (x² − 4) dx",a:"x³/3 − 4x + C",w:["x³ − 4x + C","x³/3 − 4 + C","2x + C"]},
   ]},
  {name:"The Frost Tower — Trig",boss:"Ice Witch",bossEmoji:"❄️",color:"#0891b2",
   problems:[
    {q:"∫ cos(x) dx",a:"sin(x) + C",w:["−sin(x) + C","cos(x) + C","tan(x) + C"]},
    {q:"∫ sin(x) dx",a:"−cos(x) + C",w:["cos(x) + C","sin(x) + C","−sin(x) + C"]},
    {q:"∫ sec²(x) dx",a:"tan(x) + C",w:["sec(x) + C","2sec(x)tan(x) + C","tan²(x) + C"]},
    {q:"∫ 2cos(x) dx",a:"2sin(x) + C",w:["sin(x) + C","−2sin(x) + C","2cos(x) + C"]},
   ]},
  {name:"The Arcane Pinnacle — Final Boss",boss:"Arch-Lich",bossEmoji:"☠️",color:"#be123c",
   problems:[
    {q:"∫ eˣ dx",a:"eˣ + C",w:["xeˣ + C","eˣ/x + C","eˣ⁺¹ + C"]},
    {q:"∫ 2eˣ dx",a:"2eˣ + C",w:["eˣ + C","2eˣ⁺¹ + C","xe²ˣ + C"]},
    {q:"∫ (eˣ + x) dx",a:"eˣ + x²/2 + C",w:["eˣ + x + C","eˣ + 2x + C","xeˣ + x + C"]},
    {q:"∫ (sin x + eˣ) dx",a:"−cos(x) + eˣ + C",w:["cos(x) + eˣ + C","−cos(x) + xeˣ + C","sin(x) + eˣ + C"]},
   ]},
];

const CW=640,CH=300;
const TILE=32,COLS=20,ROWS=Math.floor(CH/TILE);
const gc=document.getElementById('gc');
gc.width=CW;gc.height=CH;
const ctx=gc.getContext('2d');
const sc=document.getElementById('stars-canvas');
sc.width=CW;sc.height=CH;
const sctx=sc.getContext('2d');

const FLOOR_COL='#1a1030';
const WALL_COL='#0a061a';
const RUNE_COL='#4c1d95';
const RUNE_ACTIVE='#7c3aed';
const PORTAL_COL='#6d28d9';

let gs={
  level:0, score:0, streak:0,
  playerX:3, playerY:Math.floor(ROWS/2),
  mana:3, maxMana:3,
  bossX:COLS-4, bossY:Math.floor(ROWS/2),
  bossHp:4, maxBossHp:4,
  runes:[], activeRune:null,
  gateOpen:false, gateX:COLS-2, gateY:Math.floor(ROWS/2),
  particles:[],
  answered:false, locked:false,
  keys:{},
  lastMove:0,
  phase:'explore',
  spellAnim:null,
  bossAnim:0,
  tick:0,
  won:false, dead:false
};

function initLevel(){
  const lv=LEVELS[gs.level];
  gs.bossHp=lv.problems.length;
  gs.maxBossHp=lv.problems.length;
  gs.gateOpen=false;
  gs.bossX=COLS-4; gs.bossY=Math.floor(ROWS/2);
  gs.playerX=3; gs.playerY=Math.floor(ROWS/2);
  gs.mana=3; gs.maxMana=3;
  gs.particles=[];
  gs.phase='explore';
  gs.activeRune=null;
  gs.runes=lv.problems.map((_,i)=>({
    x:6+Math.floor(i*2.8), y:1+Math.floor(Math.random()*(ROWS-2)),
    solved:false, problemIdx:i, pulse:Math.random()*Math.PI*2
  }));
  updateHUD();
  renderUI();
}

function shuffle(a){return[...a].sort(()=>Math.random()-0.5)}

function renderUI(){
  const lv=LEVELS[gs.level];
  const pi=gs.activeRune!==null?gs.activeRune.problemIdx:0;
  const prob=lv.problems[pi];
  document.getElementById('integral-display').textContent=prob.q;
  document.getElementById('feedback-bar').textContent='';
  document.getElementById('feedback-bar').className='';
  const grid=document.getElementById('choices-grid');
  grid.innerHTML='';
  const choices=shuffle([prob.a,...prob.w.slice(0,3)]);
  choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='spell-btn';
    btn.textContent=c;
    btn.onclick=()=>handleChoice(c,prob.a,btn);
    grid.appendChild(btn);
  });
  document.getElementById('spell-prompt').textContent=
    gs.activeRune?'Cast the antiderivative spell':'Move to a glowing rune to cast';
}

function handleChoice(chosen,correct,btn){
  if(gs.locked||gs.phase!=='spell')return;
  gs.locked=true;
  const all=document.querySelectorAll('.spell-btn');
  if(chosen===correct){
    btn.classList.add('correct');
    gs.streak++;gs.score+=gs.streak>=3?20:10;
    document.getElementById('feedback-bar').textContent=gs.streak>=3?'Critical hit! +20':'+10 mana restored!';
    document.getElementById('feedback-bar').className='good';
    gs.activeRune.solved=true;
    gs.bossHp--;
    spawnSpell(gs.playerX,gs.playerY,gs.bossX,gs.bossY,'#a78bfa');
    if(gs.bossHp<=0){
      gs.gateOpen=true;
      document.getElementById('feedback-bar').textContent='Boss banished! The gate opens!';
    }
    updateHUD();
    setTimeout(()=>{
      gs.phase='explore';gs.activeRune=null;gs.locked=false;
      renderUI();
    },900);
  } else {
    btn.classList.add('wrong');
    all.forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});
    gs.streak=0;gs.mana=Math.max(0,gs.mana-1);
    document.getElementById('feedback-bar').textContent='Wrong spell! The enemy retaliates! −1 mana';
    document.getElementById('feedback-bar').className='bad';
    spawnSpell(gs.bossX,gs.bossY,gs.playerX,gs.playerY,'#f87171');
    updateHUD();
    if(gs.mana<=0){setTimeout(()=>endGame(false),900);return;}
    setTimeout(()=>{
      gs.phase='explore';gs.activeRune=null;gs.locked=false;
      renderUI();
    },1200);
  }
}

function spawnSpell(fx,fy,tx,ty,col){
  gs.spellAnim={fx:fx*TILE+TILE/2,fy:fy*TILE+TILE/2,tx:tx*TILE+TILE/2,ty:ty*TILE+TILE/2,t:0,col};
}

function updateHUD(){
  const lv=LEVELS[gs.level];
  document.getElementById('h-level').textContent=gs.level+1;
  document.getElementById('h-score').textContent=gs.score;
  document.getElementById('h-mana').textContent=gs.mana+' / '+gs.maxMana;
  document.getElementById('h-streak').textContent=gs.streak;
}

function endGame(won){
  gs.won=won;gs.dead=!won;
  const ow=document.getElementById('overlay-wrap');
  ow.classList.add('show');
  if(won){
    document.getElementById('ov-title').textContent='Victory! ✨';
    document.getElementById('ov-sub').textContent='You have mastered the arcane arts of integration! Score: '+gs.score;
  } else {
    document.getElementById('ov-title').textContent='Mana depleted...';
    document.getElementById('ov-sub').textContent='The dungeon claims another wizard. Score: '+gs.score;
  }
  document.getElementById('ov-btn').textContent='Try again';
}

function overlayAct(){
  document.getElementById('overlay-wrap').classList.remove('show');
  gs={...gs,level:0,score:0,streak:0,won:false,dead:false};
  initLevel();
}

function drawStars(){
  sctx.clearRect(0,0,CW,CH);
  for(let i=0;i<80;i++){
    const x=(i*137+17)%CW,y=(i*91+43)%CH;
    const r=i%5===0?1.5:0.8;
    const alpha=0.3+0.4*Math.sin(Date.now()/1200+i);
    sctx.fillStyle=`rgba(200,190,255,${alpha})`;
    sctx.beginPath();sctx.arc(x,y,r,0,Math.PI*2);sctx.fill();
  }
}

function drawGame(){
  ctx.clearRect(0,0,CW,CH);
  const lv=LEVELS[gs.level];

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const isEdge=r===0||r===ROWS-1||c===0||c===COLS-1;
      ctx.fillStyle=isEdge?WALL_COL:FLOOR_COL;
      ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
      if(!isEdge){
        ctx.strokeStyle='rgba(80,50,180,0.12)';ctx.lineWidth=0.5;
        ctx.strokeRect(c*TILE,r*TILE,TILE,TILE);
      }
    }
  }

  gs.runes.forEach(ru=>{
    if(ru.solved)return;
    ru.pulse+=0.07;
    const alpha=0.5+0.5*Math.sin(ru.pulse);
    ctx.fillStyle=`rgba(124,58,237,${alpha*0.3})`;
    ctx.beginPath();ctx.arc(ru.x*TILE+TILE/2,ru.y*TILE+TILE/2,12,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=`rgba(167,139,250,${alpha})`;ctx.lineWidth=1.5;
    ctx.strokeStyle=lv.color;
    ctx.beginPath();ctx.arc(ru.x*TILE+TILE/2,ru.y*TILE+TILE/2,10,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#e9d5ff';ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('✦',ru.x*TILE+TILE/2,ru.y*TILE+TILE/2);
  });

  if(gs.gateOpen||gs.bossHp<=0){
    const gx=gs.gateX*TILE,gy=gs.gateY*TILE;
    const pulse=0.6+0.4*Math.sin(Date.now()/400);
    ctx.fillStyle=`rgba(109,40,217,${pulse*0.5})`;
    ctx.fillRect(gx,gy-TILE,TILE,TILE*3);
    ctx.strokeStyle='#a78bfa';ctx.lineWidth=2;
    ctx.strokeRect(gx,gy-TILE,TILE,TILE*3);
    ctx.fillStyle='#e9d5ff';ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🌀',gx+TILE/2,gy+TILE/2);
  }

  if(gs.bossHp>0){
    gs.bossAnim+=0.06;
    const bx=gs.bossX*TILE+TILE/2,by=gs.bossY*TILE+TILE/2+Math.sin(gs.bossAnim)*3;
    ctx.fillStyle='rgba(190,18,60,0.18)';
    ctx.beginPath();ctx.arc(bx,by,18,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#be123c';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(bx,by,18,0,Math.PI*2);ctx.stroke();
    ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(lv.bossEmoji,bx,by);
    const hpW=36*(gs.bossHp/gs.maxBossHp);
    ctx.fillStyle='#1a0a2e';ctx.fillRect(bx-18,by-26,36,5);
    ctx.fillStyle='#be123c';ctx.fillRect(bx-18,by-26,hpW,5);
  }

  const wx=gs.playerX*TILE+TILE/2,wy=gs.playerY*TILE+TILE/2;
  ctx.fillStyle='rgba(139,92,246,0.2)';
  ctx.beginPath();ctx.arc(wx,wy,14,0,Math.PI*2);ctx.fill();
  ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🧙',wx,wy);

  gs.particles=gs.particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=0.03;
    if(p.life<=0)return false;
    ctx.fillStyle=p.col+Math.floor(p.life*255).toString(16).padStart(2,'0');
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
    return true;
  });

  if(gs.spellAnim){
    const sa=gs.spellAnim;
    sa.t+=0.06;
    const t=sa.t;
    const x=sa.fx+(sa.tx-sa.fx)*t,y=sa.fy+(sa.ty-sa.fy)*t;
    ctx.fillStyle=sa.col;
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
    for(let i=0;i<3;i++){
      gs.particles.push({x,y,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:0.8,col:sa.col,r:3});
    }
    if(sa.t>=1)gs.spellAnim=null;
  }
}

function tryMove(dx,dy){
  if(gs.phase==='spell'||gs.locked)return;
  const nx=gs.playerX+dx,ny=gs.playerY+dy;
  if(nx<1||nx>=COLS-1||ny<1||ny>=ROWS-1)return;
  gs.playerX=nx;gs.playerY=ny;

  const ru=gs.runes.find(r=>!r.solved&&r.x===nx&&r.y===ny);
  if(ru){
    gs.activeRune=ru;
    gs.phase='spell';
    renderUI();
    return;
  }

  if(gs.gateOpen&&Math.abs(nx-gs.gateX)<=1&&ny===gs.gateY){
    if(gs.level<LEVELS.length-1){
      gs.level++;
      document.getElementById('overlay-wrap').classList.add('show');
      const next=LEVELS[gs.level];
      document.getElementById('ov-title').textContent='Gate cleared! ✨';
      document.getElementById('ov-sub').textContent='You advance to '+next.name+'.\nFace the '+next.boss+'!';
      document.getElementById('ov-btn').textContent='Enter the next realm';
      gs.won=false;gs.dead=false;
    } else {
      endGame(true);
    }
  }
}

document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k))e.preventDefault();
  gs.keys[k]=true;
});
document.addEventListener('keyup',e=>{gs.keys[e.key.toLowerCase()]=false});

function processInput(now){
  if(now-gs.lastMove<140)return;
  const k=gs.keys;
  if(k['w']||k['arrowup']){tryMove(0,-1);gs.lastMove=now;}
  else if(k['s']||k['arrowdown']){tryMove(0,1);gs.lastMove=now;}
  else if(k['a']||k['arrowleft']){tryMove(-1,0);gs.lastMove=now;}
  else if(k['d']||k['arrowright']){tryMove(1,0);gs.lastMove=now;}
}

function loop(now){
  requestAnimationFrame(loop);
  gs.tick++;
  if(gs.tick%2===0)drawStars();
  processInput(now);
  drawGame();
}

initLevel();
requestAnimationFrame(loop);
</script>
